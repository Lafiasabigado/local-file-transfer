<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare - Fast File Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .drop-zone--over { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass rounded-3xl shadow-2xl overflow-hidden p-8">
        <!-- Logo -->
        <div class="flex items-center justify-center mb-8 gap-2">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">LocalShare</h1>
        </div>

        <!-- Choice Screen -->
        <div id="choice-screen" class="space-y-4">
            <button id="btn-send" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold transition-all transform hover:scale-[1.02] shadow-lg shadow-blue-100 flex items-center justify-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                Send Files
            </button>
            <button id="btn-receive" class="w-full py-4 bg-white border-2 border-gray-100 hover:border-blue-200 text-gray-700 rounded-2xl font-semibold transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                Receive Files
            </button>
        </div>

        <!-- Send Screen -->
        <div id="send-screen" class="hidden space-y-6 animate-in fade-in duration-300">
            <div class="text-center">
                <p class="text-sm text-gray-500 mb-1">Your Session Code</p>
                <div id="session-code" class="text-4xl font-bold tracking-widest text-blue-600">000000</div>
            </div>

            <div id="drop-zone" class="border-2 border-dashed border-gray-200 rounded-3xl p-8 text-center hover:border-blue-400 transition-colors cursor-pointer group">
                <input type="file" id="file-input" class="hidden" multiple>
                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                </div>
                <p class="text-gray-600 font-medium">Drop files or click to upload</p>
                <p class="text-xs text-gray-400 mt-1">Up to 100MB per file</p>
            </div>

            <div id="upload-status" class="hidden space-y-2">
                <div class="flex justify-between text-xs font-semibold">
                    <span id="status-text" class="text-blue-600">Uploading...</span>
                    <span id="status-percent">0%</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2">
                    <div id="status-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div id="sent-files" class="space-y-3">
                <!-- List of uploaded files -->
            </div>
            
            <button id="back-to-menu-send" class="w-full py-2 text-sm text-gray-400 hover:text-gray-600 transition-colors">Cancel Session</button>
        </div>

        <!-- Receive Screen -->
        <div id="receive-screen" class="hidden space-y-6">
            <div id="code-entry" class="space-y-4">
                <h3 class="text-lg font-semibold text-center text-gray-800">Enter Session Code</h3>
                <input type="text" id="input-code" placeholder="123456" class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl text-center text-2xl font-bold tracking-widest focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button id="btn-join" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-semibold shadow-lg shadow-blue-100">Connect</button>
            </div>

            <div id="file-list-container" class="hidden space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-semibold text-gray-800">Available Files</h3>
                    <span class="text-xs px-2 py-1 bg-green-100 text-green-600 rounded-lg font-bold">Connected</span>
                </div>
                <div id="file-list" class="space-y-3 max-h-64 overflow-y-auto pr-2">
                    <!-- Files to download -->
                </div>
            </div>
            
            <button id="back-to-menu-receive" class="w-full py-2 text-sm text-gray-400 hover:text-gray-600 transition-colors">Back to Menu</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

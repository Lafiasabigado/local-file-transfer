<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare - AirDrop Alternative</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="glass-panel">

        <!-- Header -->
        <header>
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
            <h1>LocalShare</h1>
            <div class="header-actions">
                <button id="btn-theme" class="icon-button" title="Toggle Dark Mode">
                    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button id="btn-history" class="icon-button" title="Transfer History">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Screen 1: Choice -->
            <div id="screen-choice" class="screen view-active">
                <div class="split-choices">
                    <button id="btn-choice-send" class="choice-card primary">
                        <div class="icon-pulse">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        </div>
                        <h2>Send Files</h2>
                        <p>Share with devices on this Wi-Fi</p>
                    </button>

                    <button id="btn-choice-receive" class="choice-card secondary">
                        <div class="icon-pulse static">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                        <h2>Receive Files</h2>
                        <p>Enter a code or scan QR</p>
                    </button>
                </div>
            </div>

            <!-- Screen 2: Send -->
            <div id="screen-send" class="screen flex-col">
                <div class="session-info">
                    <div class="code-section">
                        <span class="label">YOUR PIN CODE</span>
                        <div class="code-digits" id="my-session-code">------</div>
                        <span class="label ip-label" id="sender-ip-display"></span>
                    </div>
                    <div class="qr-section">
                        <span class="label">SCAN TO CONNECT</span>
                        <div class="qr-wrapper">
                            <canvas id="qr-canvas" width="100" height="100"></canvas>
                            <div id="qr-placeholder" class="loader"></div>
                        </div>
                    </div>
                </div>

                <div id="drop-zone" class="drop-zone">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v16m8-8H4"></path></svg>
                    <h3>Drop files here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="file-input" multiple>
                </div>

                <div id="sender-file-list" class="file-list hidden"></div>

                <button class="back-link" onclick="ui.showScreen('screen-choice')">← Cancel & Back</button>
            </div>

            <!-- Screen 3: Receive -->
            <div id="screen-receive" class="screen flex-col">
                <div class="receive-form" id="receive-form">
                    <h3>Connect to Sender</h3>
                    <p class="receive-subtitle">Enter the sender's IP address and the PIN shown on their screen</p>
                    <div class="input-group">
                        <label class="input-label">SENDER'S IP ADDRESS</label>
                        <input type="text" id="ip-input" placeholder="e.g. 192.168.1.42" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label class="input-label">6-DIGIT PIN CODE</label>
                        <input type="text" id="pin-input" maxlength="6" placeholder="• • • • • •" autocomplete="off">
                    </div>
                    <button id="btn-connect" class="action-btn">Connect</button>
                    <div class="divider"><span>or</span></div>
                    <button id="btn-scan-qr" class="action-btn secondary-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h4v-7h-7"/><path d="M14 21v-1"/></svg>
                        Scan QR Code with Camera
                    </button>
                </div>

                <div id="receiver-file-list" class="file-list hidden">
                    <div class="connection-status">
                        <span class="status-dot online"></span> Connected to Session
                    </div>
                </div>

                <button class="back-link" onclick="disconnectAndGoBack()">← Cancel & Back</button>
            </div>

            <!-- Screen 4: History -->
            <div id="screen-history" class="screen flex-col">
                <h3>Transfer History</h3>
                <div id="history-list" class="file-list">
                    <!-- History goes here -->
                </div>
                <button class="back-link" onclick="ui.showScreen('screen-choice')">← Back to Menu</button>
            </div>
        </main>
    </div>

    <!-- QR Scanner Modal -->
    <div id="qr-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Scan QR Code</h3>
                <button id="btn-close-scanner" class="icon-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="scanner-container">
                <video id="qr-video" autoplay playsinline muted></video>
                <div class="scanner-overlay">
                    <div class="scanner-frame"></div>
                </div>
            </div>
            <p class="scanner-hint">Pointez la caméra vers le QR code du sender</p>
        </div>
    </div>

    <!-- Load Socket.IO locally -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- QR code generator (local, no CDN) -->
    <script src="/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

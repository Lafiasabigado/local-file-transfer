<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="file:///android_asset/style.css">
</head>
<body>
    <div id="app" class="glass-panel">

        <!-- Header — exact copy of desktop -->
        <header>
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
            <h1>LocalShare</h1>
            <div class="header-actions">
                <button id="btn-lang" class="icon-button lang-btn" title="Switch Language">
                    <span id="lang-text">FR</span>
                </button>
                <button id="btn-refresh" class="icon-button" title="Refresh" style="margin-right: 4px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
                <button id="btn-theme" class="icon-button" title="Toggle Dark Mode">
                    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">

            <!-- Screen 1: Home — Send / Receive (same as desktop) -->
            <div id="screen-choice" class="screen view-active">
                <div class="split-choices">
                    <button id="btn-choice-send" class="choice-card primary">
                        <div class="icon-pulse">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        </div>
                        <h2 data-i18n="send_title">Send Files</h2>
                        <p data-i18n="send_desc">Share with devices on this Wi-Fi</p>
                    </button>

                    <button id="btn-choice-receive" class="choice-card secondary">
                        <div class="icon-pulse static">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                        <h2 data-i18n="recv_title">Receive Files</h2>
                        <p data-i18n="recv_desc">Enter a code</p>
                    </button>
                </div>
            </div>

            <!-- Screen 2: Connect to Server (appears when clicking Send OR Receive) -->
            <div id="screen-connect" class="screen flex-col">
                <div class="receive-form">
                    <h3 id="connect-heading">Connect to PC</h3>
                    <p class="receive-subtitle" id="connect-subtitle">Enter the IP address shown on the sender's LocalShare screen. Both devices must be on the same Wi-Fi.</p>
                    <div class="input-group">
                        <label class="input-label">IP ADDRESS</label>
                        <input type="text" id="ip-input" placeholder="e.g. 192.168.1.42" autocomplete="off" autocorrect="off" autocapitalize="none">
                    </div>
                    <button id="btn-connect" class="action-btn">Connect</button>
                </div>
                <button class="back-link" id="btn-back">← Back</button>
            </div>

        </main>
    </div>

<script>
// ─── STATE ───
let currentLang = localStorage.getItem('lang') || 'EN';
let pendingAction = null; // 'send' or 'receive'

// ─── i18n ───
const i18n = {
    EN: {
        send_title: "Send Files", send_desc: "Share with devices on this Wi-Fi",
        recv_title: "Receive Files", recv_desc: "Enter a code",
        no_network: "You are not connected to any Wi-Fi network. Please connect to the same network as the other device to transfer files.",
        connect_send_heading: "Connect to network",
        connect_send_sub: "Enter the IP address of the device running LocalShare. Your phone will create a session and display the PIN code for the other device.",
        connect_recv_heading: "Connect to sender",
        connect_recv_sub: "Enter the IP address shown on the sender's LocalShare screen. Both devices must be on the same Wi-Fi.",
    },
    FR: {
        send_title: "Envoyer Fichiers", send_desc: "Partager sur ce Wi-Fi",
        recv_title: "Recevoir Fichiers", recv_desc: "Saisir le code",
        no_network: "Vous n'êtes connecté à aucun réseau Wi-Fi. Veuillez vous connecter au même réseau que l'autre appareil pour effectuer le transfert.",
        connect_send_heading: "Se connecter au réseau",
        connect_send_sub: "Entrez l'adresse IP de l'appareil qui exécute LocalShare. Votre téléphone créera une session et affichera le code PIN.",
        connect_recv_heading: "Se connecter à l'expéditeur",
        connect_recv_sub: "Entrez l'adresse IP affichée sur l'écran LocalShare de l'expéditeur. Les deux appareils doivent être sur le même Wi-Fi.",
    }
};

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('lang-text').innerText = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
    });
}

// ─── THEME ───
(function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved || (prefersDark ? 'dark' : 'light'));
})();

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const sunIcon  = document.getElementById('icon-sun');
    const moonIcon = document.getElementById('icon-moon');
    if (sunIcon)  sunIcon.style.display  = theme === 'dark' ? 'none'  : 'block';
    if (moonIcon) moonIcon.style.display = theme === 'dark' ? 'block' : 'none';
}

// ─── SCREENS ───
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('view-active'));
    document.getElementById(id).classList.add('view-active');
}

// ─── NETWORK CHECK & AUTO DISCOVERY ───
function checkNetwork() {
    if (!navigator.onLine) {
        document.getElementById('connect-heading').textContent = currentLang === 'FR' ? 'Pas de réseau' : 'No Network';
        document.getElementById('connect-subtitle').textContent = i18n[currentLang].no_network;
        document.getElementById('connect-subtitle').style.color = '#FF3B30';
        document.getElementById('ip-input').style.display = 'none';
        document.getElementById('btn-connect').style.display = 'none';
        document.querySelector('#screen-connect .input-group').style.display = 'none';
        showScreen('screen-connect');
        return false;
    }
    // Reset styles
    document.getElementById('connect-subtitle').style.color = '';
    document.getElementById('ip-input').style.display = '';
    document.getElementById('btn-connect').style.display = '';
    document.querySelector('#screen-connect .input-group').style.display = '';
    return true;
}

// Check an IP silently to see if LocalShare PC is running there
function pingServer(ip) {
    return new Promise((resolve) => {
        const timeout = setTimeout(() => resolve(false), 800);
        const img = new Image();
        img.onload = () => { clearTimeout(timeout); resolve(true); };
        img.onerror = () => { clearTimeout(timeout); resolve(true); }; // usually ok if resolving the port
        img.src = 'http://' + ip + ':3000/icon.png?' + Date.now();
    });
}

async function handleActionClick(actionType) {
    if (!checkNetwork()) return;
    pendingAction = actionType;
    
    // Change UI to loading state temporarily
    const btn = actionType === 'send' ? document.getElementById('btn-choice-send') : document.getElementById('btn-choice-receive');
    const oldText = btn.querySelector('h2').textContent;
    btn.querySelector('h2').textContent = 'Connecting...';
    
    // Try auto-discovery
    let targetIp = localStorage.getItem('last_ip');
    
    // If not found or if we want to prioritize hotspot gateway:
    const gateway = window.AndroidHost ? window.AndroidHost.getGatewayIp() : null;
    if (gateway && gateway !== "0.0.0.0") {
        targetIp = gateway; // Prioritize Gateway (if phone is connected to PC Hotspot)
    }

    if (targetIp) {
        const cleanIp = targetIp.replace('http://', '').replace('https://', '').trim();
        const serverExists = await pingServer(cleanIp);
        if (serverExists) {
            localStorage.setItem('last_ip', cleanIp);
            window.location.href = 'http://' + cleanIp + ':3000/#automode=' + pendingAction;
            return;
        }
    }
    
    // Auto-discovery failed or no IP known -> show manual IP input screen
    btn.querySelector('h2').textContent = oldText;
    document.getElementById('connect-heading').textContent = i18n[currentLang]['connect_' + pendingAction + '_heading'] || 'Connect to PC';
    document.getElementById('connect-subtitle').textContent = i18n[currentLang]['connect_' + pendingAction + '_sub'] || 'Enter the IP address of the PC.';
    showScreen('screen-connect');
}

// ─── EVENT LISTENERS ───
document.getElementById('btn-theme').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

document.getElementById('btn-lang').addEventListener('click', () => {
    setLanguage(currentLang === 'EN' ? 'FR' : 'EN');
});

document.getElementById('btn-refresh').addEventListener('click', () => {
    window.location.reload();
});

document.getElementById('btn-choice-send').addEventListener('click', () => handleActionClick('send'));
document.getElementById('btn-choice-receive').addEventListener('click', () => handleActionClick('receive'));

document.getElementById('btn-back').addEventListener('click', () => {
    showScreen('screen-choice');
});

document.getElementById('btn-connect').addEventListener('click', () => {
    const ip = document.getElementById('ip-input').value.trim();
    if (!ip) {
        document.getElementById('ip-input').style.borderColor = '#FF3B30';
        return;
    }
    localStorage.setItem('last_ip', ip);
    const cleanIp = ip.replace('http://', '').replace('https://', '').trim();
    const base = cleanIp.includes(':') ? 'http://' + cleanIp : 'http://' + cleanIp + ':3000';
    window.location.href = base + '/#automode=' + pendingAction;
});

// Restore last IP
const lastIp = localStorage.getItem('last_ip');
if (lastIp) document.getElementById('ip-input').value = lastIp;

// Init language
document.getElementById('lang-text').innerText = currentLang;
setLanguage(currentLang);
</script>
</body>
</html>

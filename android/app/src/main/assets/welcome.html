<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalShare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="file:///android_asset/style.css">
</head>
<body>
    <div id="app" class="glass-panel">

        <header>
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
            <h1>LocalShare</h1>
            <div class="header-actions">
                <button id="btn-lang" class="icon-button lang-btn" title="Switch Language">
                    <span id="lang-text">FR</span>
                </button>
                <button id="btn-refresh" class="icon-button" title="Refresh" style="margin-right: 4px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
                <button id="btn-theme" class="icon-button" title="Toggle Dark Mode">
                    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </header>

        <main id="main-content">

            <!-- Screen 1: Home — Send / Receive -->
            <div id="screen-choice" class="screen view-active">
                <div class="split-choices">
                    <button id="btn-choice-send" class="choice-card primary">
                        <div class="icon-pulse">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        </div>
                        <h2 data-i18n="send_title">Send Files</h2>
                        <p data-i18n="send_desc">Share with devices on this Wi-Fi</p>
                    </button>
                    <button id="btn-choice-receive" class="choice-card secondary">
                        <div class="icon-pulse static">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                        <h2 data-i18n="recv_title">Receive Files</h2>
                        <p data-i18n="recv_desc">Enter a code</p>
                    </button>
                </div>
            </div>

            <!-- Screen 2: Scanning / Manual IP -->
            <div id="screen-connect" class="screen flex-col">
                <div class="receive-form">
                    <!-- Scanning animation (shown during mDNS scan) -->
                    <div id="scan-box" style="text-align:center;padding:20px 0;">
                        <div id="scan-spinner" style="width:48px;height:48px;border:3px solid var(--glass-border);border-top-color:var(--accent-primary);border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite;"></div>
                        <h3 id="scan-title" data-i18n="scanning">Searching for devices…</h3>
                        <p id="scan-sub" style="color:var(--text-secondary);font-size:13px;margin-top:6px;" data-i18n="scanning_sub">Scanning your network</p>
                    </div>

                    <!-- Manual IP fallback (shown after scan fails) -->
                    <div id="manual-box" style="display:none;">
                        <h3 data-i18n="manual_heading">Enter IP manually</h3>
                        <p class="receive-subtitle" data-i18n="manual_sub">Could not find LocalShare on this network. Enter the IP address shown on the PC.</p>
                        <div class="input-group">
                            <label class="input-label" data-i18n="ip_label">IP ADDRESS</label>
                            <input type="text" id="ip-input" placeholder="e.g. 192.168.1.42" autocomplete="off" autocorrect="off" autocapitalize="none">
                        </div>
                        <button id="btn-connect" class="action-btn" data-i18n="connect_btn">Connect</button>
                        <p id="connect-status" style="font-size:13px;line-height:1.6;margin-top:12px;padding:12px;border-radius:10px;display:none;white-space:pre-line;"></p>
                    </div>
                </div>
                <button class="back-link" id="btn-back" data-i18n="back_btn">← Back</button>
            </div>

        </main>
    </div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
let currentLang = localStorage.getItem('lang') || 'EN';
let pendingAction = null;

const i18n = {
    EN: {
        send_title: "Send Files", send_desc: "Share with devices on this Wi-Fi",
        recv_title: "Receive Files", recv_desc: "Enter a code",
        scanning: "Searching for devices…", scanning_sub: "Scanning your network",
        pc_found: "PC found! Connecting…",
        manual_heading: "Enter IP manually",
        manual_sub: "Could not find LocalShare automatically. Enter the IP shown on the PC running LocalShare.",
        ip_label: "IP ADDRESS", connect_btn: "Connect", connecting_btn: "Connecting…",
        back_btn: "← Back",
        no_network: "No network detected. Connect to Wi-Fi or enable a hotspot.",
        connect_error: "Cannot reach server. Check that LocalShare is running and both devices are on the same network.",
    },
    FR: {
        send_title: "Envoyer Fichiers", send_desc: "Partager sur ce Wi-Fi",
        recv_title: "Recevoir Fichiers", recv_desc: "Saisir le code",
        scanning: "Recherche des appareils…", scanning_sub: "Scan du réseau en cours",
        pc_found: "PC trouvé ! Connexion…",
        manual_heading: "Entrer l'IP manuellement",
        manual_sub: "Impossible de trouver LocalShare automatiquement. Entrez l'IP affichée sur le PC qui exécute LocalShare.",
        ip_label: "ADRESSE IP", connect_btn: "Connexion", connecting_btn: "Connexion…",
        back_btn: "← Retour",
        no_network: "Aucun réseau détecté. Connectez-vous au Wi-Fi ou activez un partage de connexion.",
        connect_error: "Impossible de joindre le serveur. Vérifiez que LocalShare est lancé et que les appareils sont sur le même réseau.",
    }
};

function t(key) { return (i18n[currentLang] && i18n[currentLang][key]) || key; }

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('lang-text').innerText = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
    });
}

(function initTheme() {
    const saved = localStorage.getItem('theme');
    applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
})();
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const s = document.getElementById('icon-sun'), m = document.getElementById('icon-moon');
    if (s) s.style.display = theme === 'dark' ? 'none' : 'block';
    if (m) m.style.display = theme === 'dark' ? 'block' : 'none';
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('view-active'));
    document.getElementById(id).classList.add('view-active');
}

// ─── NAVIGATE TO SERVER ───
function goToServer(ip, port, action) {
    localStorage.setItem('last_ip', ip);
    window.location.href = 'http://' + ip + ':' + port + '/#automode=' + action + '&lang=' + currentLang;
}

// ─── mDNS SCAN: poll AndroidHost.getDiscoveredServer() ───
function pollDiscovery(timeoutMs) {
    return new Promise((resolve) => {
        const start = Date.now();
        const interval = setInterval(() => {
            if (window.AndroidHost) {
                const server = window.AndroidHost.getDiscoveredServer();
                if (server) {
                    clearInterval(interval);
                    resolve(server); // "ip:port"
                    return;
                }
            }
            if (Date.now() - start > timeoutMs) {
                clearInterval(interval);
                resolve(null);
            }
        }, 250);
    });
}

// ─── MAIN ACTION ───
async function handleActionClick(action) {
    pendingAction = action;

    // Check network
    let hasNetwork = navigator.onLine;
    if (window.AndroidHost && typeof window.AndroidHost.getDeviceIp === 'function') {
        hasNetwork = !!window.AndroidHost.getDeviceIp();
    }
    if (!hasNetwork) {
        alert(t('no_network'));
        return;
    }

    // Show scanning screen
    document.getElementById('scan-box').style.display = '';
    document.getElementById('manual-box').style.display = 'none';
    showScreen('screen-connect');

    // Start mDNS discovery
    if (window.AndroidHost && typeof window.AndroidHost.startDiscovery === 'function') {
        window.AndroidHost.startDiscovery();
    }

    // Wait up to 6 seconds for mDNS result
    const result = await pollDiscovery(6000);

    if (result) {
        // PC found via mDNS!
        const parts = result.split(':');
        const ip = parts[0];
        const port = parts[1] || '3000';
        document.getElementById('scan-title').textContent = t('pc_found');
        document.getElementById('scan-spinner').style.borderTopColor = '#34C759';
        setTimeout(() => goToServer(ip, port, action), 500);
        return;
    }

    // mDNS failed → try last known IP as fallback
    const lastIp = localStorage.getItem('last_ip');
    if (lastIp) {
        try {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 2000);
            const resp = await fetch('http://' + lastIp + ':3000/api/session', { signal: controller.signal });
            clearTimeout(timer);
            if (resp.ok) {
                document.getElementById('scan-title').textContent = t('pc_found');
                document.getElementById('scan-spinner').style.borderTopColor = '#34C759';
                setTimeout(() => goToServer(lastIp, '3000', action), 500);
                return;
            }
        } catch(e) { /* fallback failed */ }
    }

    // All auto-discovery failed → show manual IP input
    if (window.AndroidHost && typeof window.AndroidHost.stopDiscovery === 'function') {
        window.AndroidHost.stopDiscovery();
    }
    document.getElementById('scan-box').style.display = 'none';
    document.getElementById('manual-box').style.display = '';
}

// ─── MANUAL CONNECT ───
async function handleManualConnect() {
    const raw = document.getElementById('ip-input').value.trim();
    if (!raw) { document.getElementById('ip-input').style.borderColor = '#FF3B30'; return; }
    document.getElementById('ip-input').style.borderColor = '';

    const ip = raw.replace(/^https?:\/\//, '').replace(/:\d+$/, '').trim();
    const connectBtn = document.getElementById('btn-connect');
    connectBtn.textContent = t('connecting_btn');
    connectBtn.disabled = true;
    document.getElementById('connect-status').style.display = 'none';

    try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 3000);
        const resp = await fetch('http://' + ip + ':3000/api/session', { signal: controller.signal });
        clearTimeout(timer);
        if (resp.ok) {
            goToServer(ip, '3000', pendingAction);
            return;
        }
    } catch(e) { /* failed */ }

    connectBtn.textContent = t('connect_btn');
    connectBtn.disabled = false;
    const el = document.getElementById('connect-status');
    el.textContent = t('connect_error');
    el.style.display = 'block';
    el.style.color = '#FF3B30';
    el.style.background = 'rgba(255,59,48,0.08)';
    el.style.border = '1px solid rgba(255,59,48,0.2)';
}

// ─── EVENTS ───
document.getElementById('btn-theme').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
document.getElementById('btn-lang').addEventListener('click', () => setLanguage(currentLang === 'EN' ? 'FR' : 'EN'));
document.getElementById('btn-refresh').addEventListener('click', () => window.location.reload());
document.getElementById('btn-choice-send').addEventListener('click', () => handleActionClick('send'));
document.getElementById('btn-choice-receive').addEventListener('click', () => handleActionClick('receive'));
document.getElementById('btn-back').addEventListener('click', () => {
    if (window.AndroidHost && typeof window.AndroidHost.stopDiscovery === 'function') {
        window.AndroidHost.stopDiscovery();
    }
    showScreen('screen-choice');
});
document.getElementById('btn-connect').addEventListener('click', handleManualConnect);
document.getElementById('ip-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleManualConnect(); });

// ─── INIT ───
const lastIp = localStorage.getItem('last_ip');
if (lastIp) document.getElementById('ip-input').value = lastIp;
document.getElementById('lang-text').innerText = currentLang;
setLanguage(currentLang);
</script>
</body>
</html>
